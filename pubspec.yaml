name: flutter_chat_starter
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1  # Add this
  
  # Firebase Core & Auth
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  
  # Database & Storage
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0

  firebase_messaging: ^16.2.0

  # File sharing ← NEW
  file_picker: ^8.1.2           # pick documents (PDF, docx, zip, etc.)
  url_launcher: ^6.3.0       # open files — no native build hooks
  path: ^1.9.0                  # file name/extension helpers
  path_provider: ^2.1.4         # get temp directory for downloads


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true